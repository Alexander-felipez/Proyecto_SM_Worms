<div class="lobby-container glass-panel" style="width: 100%; height: 100%; display: flex; flex-direction: column; padding: 40px; box-shadow: var(--shadow);">
    <div class="lobby-header">
        <div>
            <h2 class="lobby-title">Sala de Juego</h2>
            <p style="color: var(--text-secondary); margin-top: 5px;">Esperando jugadores...</p>
        </div>
        <div class="lobby-code" id="lobby-code">XXXX-XXXX</div>
    </div>

    <div class="lobby-content">
        <!-- Sección de Jugadores -->
        <div class="players-section">
            <h3 class="players-title">Jugadores Conectados</h3>
            <div class="players-list" id="players-list">
                <div class="player-item">
                    <span class="player-name">Jugador 1 (Tú)</span>
                    <span class="player-status"></span>
                </div>
            </div>
        </div>

        <!-- Sección de Configuración -->
        <div class="settings-section">
            <h3 style="color: var(--primary); font-size: 18px; margin-bottom: 15px;">Configuración del Juego</h3>
            
            <div class="setting-group">
                <label class="setting-label">Dificultad</label>
                <select class="setting-select" id="difficulty-select">
                    <option value="easy">Fácil</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Difícil</option>
                    <option value="extreme">Extremo</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Modo de Juego</label>
                <select class="setting-select" id="gamemode-select">
                    <option value="deathmatch" selected>Batalla Clásica</option>
                    <option value="capture">Captura de Puntos</option>
                    <option value="survival">Supervivencia</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Máximo de Jugadores</label>
                <select class="setting-select" id="max-players-select">
                    <option value="2" selected>2 Jugadores</option>
                    <option value="4">4 Jugadores</option>
                    <option value="6">6 Jugadores</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Tiempo Límite</label>
                <select class="setting-select" id="time-limit-select">
                    <option value="5">5 Minutos</option>
                    <option value="10" selected>10 Minutos</option>
                    <option value="15">15 Minutos</option>
                    <option value="0">Sin Límite</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Mapa</label>
                <select class="setting-select" id="map-select">
                    <option value="el_alto" selected>🏔️ El Alto</option>
                    <option value="santa_cruz">🌴 Santa Cruz</option>
                    <option value="luna">🌙 Luna</option>
                </select>
            </div>
        </div>
    </div>

    <div class="lobby-actions">
        <button class="btn-back" id="btn-back-lobby">← Atrás</button>
        <button class="btn-start" id="btn-start-game">Iniciar Juego →</button>
    </div>
</div>
